<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register</title>
</head>
<body>

  <h1>Register</h1>
  <form id="registerForm">
    <label for="email">University Email:</label>
    <input type="email" id="email" placeholder="name@university.edu" required />

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter password" required />

    <button type="submit">Register</button>
  </form>

  <p id="message"></p>

  <script type="module">
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const auth = getAuth();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email.endsWith("@university.edu")) {
        document.getElementById('message').innerText = "Please use a valid university email address.";
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        document.getElementById('message').innerText = "Registration successful! Please check your email for verification.";
      } catch (error) {
        document.getElementById('message').innerText = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  
  const signIn = () => {
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = result.user;
        console.log("User signed in: ", user.displayName);
      })
      .catch((error) => {
        console.error("Error signing in: ", error);
      });
  };

  
  document.querySelector('#sign-in-btn').addEventListener('click', signIn);


  
  onAuthStateChanged(auth, (user) => {
    const protectedContent = document.getElementById("protected-content");
    const loginPrompt = document.getElementById("login-prompt");

    if (user) {
      
      protectedContent.style.display = "block";
      loginPrompt.style.display = "none";
    } else {
      
      protectedContent.style.display = "none";
      loginPrompt.style.display = "block";
    }
    
  
</script>
